# XcodeGen spec — generates RileysApp.xcodeproj.
# Run ./make-project.sh (which syncs the web bundle then runs `xcodegen`).
name: RileysApp
options:
  bundleIdPrefix: com.riley
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  RileysApp:
    type: application
    platform: iOS
    sources:
      # Swift + asset catalog (the Web bundle is added separately as a folder)
      - path: RileysApp
        excludes:
          - "Web"
      # Folder reference: the web app is copied into the bundle as-is so all
      # the relative css/js/icon paths keep working offline.
      - path: RileysApp/Web
        type: folder
    info:
      path: RileysApp/Info.plist
      properties:
        CFBundleDisplayName: Riley
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSMicrophoneUsageDescription: "Riley uses the microphone so she can say letters, sounds and words out loud."
        NSSpeechRecognitionUsageDescription: "Riley's app listens on her device to check how she says letters, sounds and words. Audio stays on the phone."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.riley.rileysapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"

schemes:
  RileysApp:
    build:
      targets:
        RileysApp: all
    run:
      config: Debug
    archive:
      config: Release
