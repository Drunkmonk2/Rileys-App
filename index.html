<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Riley's Reading Adventure 🦩</title>

  <!-- Make it feel like a real app when added to the iPhone home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Riley" />
  <meta name="theme-color" content="#ff5fa2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="app">

  <!-- Persistent top bar -->
  <div class="topbar">
    <span class="hello">🦩 Riley's Adventure</span>
    <span class="stars-pill" id="stars">⭐ 0</span>
  </div>

  <!-- Flamingo Flamingo, the teacher mascot (shared across screens) -->
  <svg class="flamingo bounce" viewBox="0 0 150 210" aria-hidden="true">
    <defs>
      <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffb6cf"/><stop offset="1" stop-color="#ff7ea6"/>
      </linearGradient>
      <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff7ea6"/><stop offset="1" stop-color="#ec5a89"/>
      </linearGradient>
    </defs>
    <ellipse cx="72" cy="203" rx="42" ry="6" fill="rgba(0,0,0,.08)"/>
    <!-- long elegant legs -->
    <g stroke="#f5945f" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M78 134 L84 168 L76 196"/>
      <path d="M64 134 L58 168 L66 196"/>
      <path d="M70 196 h14 M60 196 h14"/>
    </g>
    <!-- tail feathers -->
    <path d="M46 120 C28 116 16 104 10 94 C24 100 42 108 54 118 Z" fill="url(#wing)"/>
    <path d="M18 96 C14 92 12 88 12 84 C16 86 20 90 22 96 Z" fill="#2b2440"/>
    <!-- slender body -->
    <ellipse cx="66" cy="120" rx="34" ry="23" transform="rotate(-14 66 120)" fill="url(#body)"/>
    <!-- folded wing with feather detail -->
    <path d="M50 110 Q72 99 94 113 Q88 132 60 131 Q50 123 50 110 Z" fill="url(#wing)"/>
    <g stroke="#d94d7d" stroke-width="1.5" fill="none" opacity=".7">
      <path d="M58 114 Q72 110 86 118"/>
      <path d="M60 120 Q73 117 84 123"/>
    </g>
    <path d="M50 112 C46 116 45 121 47 125 C50 121 52 117 54 114 Z" fill="#2b2440"/>
    <!-- long S-curve neck -->
    <path d="M82 112 C106 100 96 62 80 48" fill="none" stroke="#ff8fae"
          stroke-width="12" stroke-linecap="round"/>
    <!-- head -->
    <circle cx="78" cy="44" r="13" fill="#ff8fae"/>
    <!-- iconic hooked beak with black tip -->
    <path d="M85 36 C103 30 116 38 114 50 L104 52 C104 42 95 39 85 43 Z" fill="#ff9bb0"/>
    <path d="M114 50 C113 63 103 66 95 59 C102 57 104 52 104 52 Z" fill="#2b2440"/>
    <!-- teacher glasses + eye -->
    <g stroke="#2b2440" stroke-width="2.5" fill="#fff"><circle cx="76" cy="42" r="8"/></g>
    <circle cx="77" cy="43" r="3.2" fill="#2b2440"/>
    <path d="M84 42 q4 -1 6 1" stroke="#2b2440" stroke-width="2.5" fill="none"/>
    <path d="M68 41 L62 39" stroke="#2b2440" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- graduation cap -->
    <g transform="rotate(-12 78 28)">
      <rect x="66" y="22" width="24" height="6" rx="2" fill="#2b2440"/>
      <polygon points="78,16 99,25 78,34 57,25" fill="#3a3157"/>
      <path d="M97 25 V37" stroke="#ffce3a" stroke-width="2"/>
      <circle cx="97" cy="39" r="2.6" fill="#ffce3a"/>
    </g>
    <circle cx="70" cy="50" r="4" fill="#ff5fa2" opacity=".45"/>
  </svg>
  <div class="speech-bubble" id="bubble">Hi Riley!</div>

  <!-- ================= HOME ================= -->
  <section id="home" class="screen active">
    <button class="tile learn" id="tile-learn">
      <span class="ico">⭐</span>Let's Learn!<small>a fun lesson just for you</small>
    </button>
    <div class="menu">
      <button class="tile letters"  id="tile-letters"><span class="ico">🔤</span>Letters</button>
      <button class="tile numbers"  id="tile-numbers"><span class="ico">🔢</span>Numbers</button>
      <button class="tile read"     id="tile-read"><span class="ico">📖</span>Read Words</button>
      <button class="tile spelling" id="tile-spelling"><span class="ico">📝</span>Spelling</button>
    </div>
    <div class="row">
      <button class="tile stickers wide" id="tile-stickers"><span class="ico">🏆</span>My Stickers</button>
    </div>
    <div class="row"><button class="back" id="grownups">🔒 Grown-ups</button></div>
  </section>

  <!-- ================= LETTERS ================= -->
  <section id="letter" class="screen">
    <div class="bigchar tappable" id="letter-char" title="Tap to hear it">A</div>
    <div class="example" id="letter-example"></div>
    <div class="progress" id="letter-progress"></div>
    <div class="heard" id="letter-heard"></div>
    <div class="row">
      <button class="btn" id="letter-hear">🔊 Hear it</button>
      <button class="btn" id="letter-say">🎤 Say it</button>
      <button class="btn" id="letter-trace">✏️ Trace it</button>
    </div>
    <div class="row">
      <button class="btn secondary" id="letter-prev">⬅️</button>
      <button class="back to-home">🏠 Home</button>
      <button class="btn secondary" id="letter-next">➡️</button>
    </div>
  </section>

  <!-- ================= NUMBERS ================= -->
  <section id="number" class="screen">
    <div class="bigchar tappable" id="number-char" title="Tap to hear it">1</div>
    <div class="number-objects" id="number-objects"></div>
    <div class="example" id="number-example"></div>
    <div class="progress" id="number-progress"></div>
    <div class="heard" id="number-heard"></div>
    <div class="row">
      <button class="btn" id="number-count">🔢 Count with me</button>
      <button class="btn" id="number-say">🎤 Say it</button>
      <button class="btn" id="number-trace">✏️ Trace it</button>
    </div>
    <div class="row">
      <button class="btn secondary" id="number-prev">⬅️</button>
      <button class="back to-home">🏠 Home</button>
      <button class="btn secondary" id="number-next">➡️</button>
    </div>
  </section>

  <!-- ================= SPELLING ================= -->
  <section id="spell" class="screen">
    <div style="font-size:4rem;text-align:center" id="spell-emoji">🐱</div>
    <div id="spell-slots" style="text-align:center;font-size:1.6rem;margin:8px"></div>
    <div id="spell-tiles" style="text-align:center;margin:8px"></div>
    <div class="heard" id="spell-heard"></div>
    <div class="row">
      <button class="btn" id="spell-hear">🔊 Sound it out</button>
      <button class="btn" id="spell-say">🎤 Say it</button>
    </div>
    <div class="row">
      <button class="back to-home">🏠 Home</button>
      <button class="btn secondary" id="spell-next">Next word ➡️</button>
    </div>
  </section>

  <!-- ================= TRACE ================= -->
  <section id="trace" class="screen">
    <div class="trace-wrap">
      <canvas id="trace-guide"></canvas>
      <canvas id="trace-draw"></canvas>
    </div>
    <div class="progress" id="trace-result"></div>
    <div class="row">
      <button class="btn" id="trace-watch">👀 Watch</button>
      <button class="btn" id="trace-check">✅ Done</button>
    </div>
    <div class="row">
      <button class="btn secondary" id="trace-clear">🔄 Clear</button>
      <button class="back" id="trace-back">⬅️ Back</button>
    </div>
  </section>

  <!-- ================= READ WORDS ================= -->
  <section id="read" class="screen">
    <div style="font-size:3.4rem;text-align:center" id="read-emoji">🐱</div>
    <div class="read-word" id="read-word"></div>
    <div class="heard" id="read-heard"></div>
    <div class="row">
      <button class="btn" id="read-sound">🔊 Sound it out</button>
      <button class="btn" id="read-say">🎤 Read it</button>
    </div>
    <div class="row">
      <button class="back to-home">🏠 Home</button>
      <button class="btn secondary" id="read-next">Next word ➡️</button>
    </div>
  </section>

  <!-- ================= SINGLE GAME (used inside guided lessons) ========= -->
  <section id="game" class="screen">
    <h2 id="game-title">Game</h2>
    <div id="game-area"></div>
    <div class="row">
      <button class="back to-home">🏠 Home</button>
    </div>
  </section>

  <!-- ================= GROWN-UP GATE ================= -->
  <section id="gate" class="screen">
    <h2>🔒 Grown-ups only</h2>
    <p class="subtitle">Solve this to open Riley's progress</p>
    <div class="bigchar" id="gate-q" style="font-size:3rem"></div>
    <div class="speech-bubble" id="gate-entry" style="min-height:2rem"></div>
    <div class="progress" id="gate-msg"></div>
    <div class="choices" id="gate-pad" style="grid-template-columns:repeat(3,1fr)"></div>
    <div class="row"><button class="back" id="gate-cancel">⬅️ Back</button></div>
  </section>

  <!-- ================= PARENT DASHBOARD ================= -->
  <section id="parent" class="screen">
    <h2>📊 Riley's Progress</h2>
    <div id="parent-body"></div>
    <div class="row">
      <button class="btn danger" id="parent-reset">🗑️ Reset Riley's progress</button>
      <button class="back to-home">🏠 Home</button>
    </div>
  </section>

  <!-- ================= STICKERS ================= -->
  <section id="stickers" class="screen">
    <h2>🏆 My Sticker Book</h2>
    <p class="subtitle">Earn a sticker every 5 stars!</p>
    <div class="sticker-grid" id="sticker-grid"></div>
    <div class="row"><button class="back to-home">🏠 Home</button></div>
  </section>

</div>

<script src="js/data.js"></script>
<script src="js/strokes.js"></script>
<script src="js/speech.js"></script>
<script src="js/tracing.js"></script>
<script src="js/games.js"></script>
<script src="js/app.js"></script>
<script>
  // Register the service worker so the app works offline & installs cleanly.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () =>
      navigator.serviceWorker.register("service-worker.js").catch(() => {}));
  }
</script>
</body>
</html>
